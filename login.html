<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Toucan Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  <link rel="icon" type="image/png" href="assets/sprites/bird-logo.png" />
  <link rel="stylesheet" href="css/style.css?v=8" />
</head>
<body>
  <nav class="nav" data-site-nav>
    <a class="brand" href="index.html"><span class="brand-bird" data-brand-bird aria-hidden="true"></span>Toucan Music</a>
    <div class="nav-links">
      <a class="nav-icon-link" href="index.html" aria-label="Home" data-tooltip="Home"><iconify-icon icon="pixelarticons:home" aria-hidden="true"></iconify-icon></a>
      <a class="nav-icon-link" href="calendar.html?v=2" aria-label="Calendar" data-tooltip="Calendar"><iconify-icon icon="pixelarticons:calendar" aria-hidden="true"></iconify-icon></a>
      <span class="nav-auth" data-nav-auth>
        <button class="nav-icon-button" type="button" data-open-settings aria-label="Settings" data-tooltip="Settings"><iconify-icon icon="pixelarticons:settings-cog" aria-hidden="true"></iconify-icon></button>
        <a class="nav-icon-link" href="login.html" aria-current="page" aria-label="Log in" data-tooltip="Log in"><iconify-icon icon="pixelarticons:login" aria-hidden="true"></iconify-icon></a>
        <a class="btn btn-beak btn-sm nav-join" href="signup.html"><iconify-icon icon="pixelarticons:user-plus" aria-hidden="true"></iconify-icon>Join us</a>
      </span>
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="panel rise">
      <h1>Welcome back</h1>
      <p class="sub">Log in to see your classes, volunteer spots, and settings.</p>
      <div class="form-error" id="error" role="alert"></div>
      <div class="login-recovery" id="confirmation-recovery" hidden>
        <strong>Confirm this account</strong>
        <p>This account exists, but its email address is still awaiting confirmation.</p>
        <button class="btn btn-quiet btn-sm" type="button" id="resend-confirmation">Send confirmation email</button>
        <p class="login-recovery-status" id="confirmation-status" role="status" aria-live="polite"></p>
      </div>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="identifier">Email (or admin name)</label>
          <input type="text" id="identifier" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button class="btn btn-beak" type="submit" id="submit" style="width:100%">Log in</button>
      </form>
      <p class="hint" style="margin-top:1.2rem">New here? <a href="signup.html">Create an account</a> as a student or a volunteer.</p>
    </div>
  </main>

  <footer data-site-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js?v=2"></script>
  <script src="js/api.js?v=6"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/background.js"></script>
  <script src="js/app.js?v=8"></script>
  <script>
    const loginForm = document.getElementById("login-form");
    const identifier = document.getElementById("identifier");
    const recovery = document.getElementById("confirmation-recovery");
    const recoveryStatus = document.getElementById("confirmation-status");
    const resendButton = document.getElementById("resend-confirmation");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("error");
      const btn = document.getElementById("submit");
      err.classList.remove("show");
      recovery.hidden = true;
      recoveryStatus.textContent = "";
      btn.disabled = true;
      btn.textContent = "Logging in...";
      try {
        const user = await ToucanAPI.login(
          identifier.value,
          document.getElementById("password").value
        );
        ToucanTour.queueFirstVisit(user);
        window.location.href = "calendar.html?v=2";
      } catch (ex) {
        const needsConfirmation = ex.code === "email_not_confirmed" || ex.message === "Email not confirmed";
        err.textContent = needsConfirmation
          ? "This account needs email confirmation before it can log in."
          : ex.message;
        err.classList.add("show");
        recovery.hidden = !needsConfirmation;
        btn.disabled = false;
        btn.textContent = "Log in";
      }
    });

    resendButton.addEventListener("click", async () => {
      resendButton.disabled = true;
      recoveryStatus.textContent = "Sending...";
      try {
        await ToucanAPI.resendConfirmation(identifier.value);
        recoveryStatus.textContent = "Confirmation sent. Open the email, confirm the account, then log in again.";
      } catch (ex) {
        recoveryStatus.textContent = ex.message;
        resendButton.disabled = false;
      }
    });

    (async () => {
      if (new URLSearchParams(window.location.search).get("confirmed") !== "1") return;
      try {
        const user = await ToucanAPI.getSession();
        if (user) {
          ToucanTour.queueFirstVisit(user);
          window.location.replace("calendar.html?v=2");
        }
      } catch (ex) {
        const err = document.getElementById("error");
        err.textContent = "The confirmation link opened, but the session could not be completed. Log in again.";
        err.classList.add("show");
      }
    })();
  </script>
</body>
</html>
